prefix: >
  A fantasy item illustrated in a clean, restrained cel-shaded illustration style suitable for a tabletop card game. The image should feel hand-drawn and illustrated, not cartoony and not painterly, with a level of detail that is practical for human reproduction.
  Overall rendering style
  Illustrated realism with restraint
  No photorealism, no painterly brushstrokes
  No exaggerated cartoon outlines
  Visual complexity kept intentionally moderate
  Linework
  Thin, unobtrusive linework used only to define major forms and edges
  Line weight is consistent and secondary to color and shading
  Avoid thick outlines or decorative line emphasis
  Interior details rely more on color and value than line
  Shading & light
  Simple cel-shading with soft transitions, not hard graphic shadow shapes
  No distinct outline around highlights or shadows
  Lighting describes form and volume without drama
  Shadows are subtle, natural, and economical
  No bloom, glow, rim lighting, or atmospheric haze
  Color handling
  Naturalistic fantasy colors with restrained saturation
  Gentle color variation within materials (e.g., wood tones), allowed to suggest texture
  Subtle gradients within a single material are acceptable
  Avoid flat monotone fills and avoid high-contrast color blocking
  Color choices should feel practical and tasteful, not stylized for effect
  Material depiction
  Materials are believable and readable but implied rather than rendered
  Texture suggested through color shifts and light, not fine detail
  Wood, metal, leather, and stone should read clearly at card size
  No excessive surface detail that would increase production cost
  Perspective & framing
  Neutral, natural perspective with no extreme angles
  Mostly centered, museum-style presentation
  Item fully visible and comfortably framed
  Composition feels stable, solid, and intentional
  When depicting action or motion, allow slight asymmetry and diagonal composition while maintaining clear readability and restrained perspective.
  Background
  Simple, subdued background that supports the item
  Background colors and values remain secondary to the object
  No detailed scenery, no narrative action
  Background should help separate the item, not compete with it
  Action should be implied through pose or gesture, not through narrative scenes, motion blur, or environmental effects.
  Restrictions
  No people, creatures, or characters
  No text, labels, borders, or UI elements
  No exaggerated cartoon style
  No painterly or hyper-detailed rendering
  Intent
  The item should feel solid, usable, and part of a grounded fantasy world
  Detail level should balance clarity, beauty, and production efficiency
  The image should look like it could be drawn consistently across an entire deck by one illustrator
